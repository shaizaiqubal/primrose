services:
  api:
    build: .
    ports: 
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://primroses1:password@postgres:5432/primroses1
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend

  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: primroses1
      POSTGRES_USER: primroses1
      POSTGRES_PASSWORD: password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U primroses1 -d primroses1"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  seed:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg://primroses1:password@postgres:5432/primroses1
    depends_on:
      postgres:
        condition: service_healthy
    command: ["python", "seed_data.py"]
    restart: "no"

  worker:
    build: .
    command: ["python","-m","backend.worker.worker"]
    environment:
      DATABASE_URL: postgresql+psycopg://primroses1:password@postgres:5432/primroses1
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app/frontend
      - frontend_node_modules:/app/frontend/node_modules
    depends_on:
      - api
volumes:
  postgres_data:
  qdrant_data:
  frontend_node_modules:
